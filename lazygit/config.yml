gui:
  theme:
    selectedLineBgColor:
      - "#313244"
    cherryPickedCommitFgColor:
      - "#89b4fa"
  branchColors: {}
git:
  pagers:
    - colorArg: always
      pager: "delta --side-by-side --paging=never --dark --plus-style='syntax #1a3a1a' --minus-style='syntax #3a1a1a' --plus-emph-style='syntax #2d5a2d' --minus-emph-style='syntax #5a2d2d'"
