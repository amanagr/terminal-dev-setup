# Starship prompt — catppuccin mocha palette, minimal and fast

palette = "catppuccin_mocha"

format = """
$directory\
$git_branch\
$git_status\
$cmd_duration\
$line_break\
$character"""

[character]
success_symbol = "[>](bold green)"
error_symbol = "[>](bold red)"

[directory]
truncation_length = 3
truncate_to_repo = true
style = "bold blue"

[git_branch]
format = "[$symbol$branch(:$remote_branch)]($style) "
style = "bold mauve"
symbol = " "

[git_status]
format = '([$all_status$ahead_behind]($style) )'
style = "bold peach"

[python]
format = '[${symbol}${pyenv_prefix}(${version} )]($style)'
symbol = " "
style = "yellow"

[nodejs]
format = "[$symbol($version )]($style)"
symbol = " "
style = "green"

[cmd_duration]
min_time = 2_000
format = "[$duration]($style) "
style = "bold yellow"

