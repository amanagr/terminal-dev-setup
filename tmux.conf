# =============================================================================
# tmux.conf — Dev-optimized config
# =============================================================================

# --- General settings ---
set -g default-terminal "tmux-256color"
set -ag terminal-overrides ",xterm-256color:RGB"
set -g mouse on
set -g history-limit 50000
set -g base-index 1
setw -g pane-base-index 1
set -g renumber-windows on
set -s escape-time 0                # No delay after Esc (important for vim)
set -g focus-events on              # Needed for vim autoread
set -g display-time 4000
set -g status-interval 5

# --- Splits (intuitive keys) ---
bind | split-window -h -c "#{pane_current_path}"
bind - split-window -v -c "#{pane_current_path}"
bind c new-window -c "#{pane_current_path}"
unbind '"'
unbind %

# --- Vim-style pane navigation ---
bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R

# Smart pane switching with awareness of Vim splits (no shell spawn)
is_vim="#{m/ri:(^|\/)g?(view|l?n?vim?x?|fzf)(diff)?$,#{pane_current_command}}"
bind -n C-h if -F "$is_vim" 'send-keys C-h' 'select-pane -L'
bind -n C-j if -F "$is_vim" 'send-keys C-j' 'select-pane -D'
bind -n C-k if -F "$is_vim" 'send-keys C-k' 'select-pane -U'
bind -n C-l if -F "$is_vim" 'send-keys C-l' 'select-pane -R'

# --- Resize panes ---
bind -r H resize-pane -L 5
bind -r J resize-pane -D 5
bind -r K resize-pane -U 5
bind -r L resize-pane -R 5

# --- Copy mode (vi keys) ---
setw -g mode-keys vi
bind Enter copy-mode
bind -T copy-mode-vi v send -X begin-selection
bind -T copy-mode-vi y send -X copy-selection-and-cancel
bind -T copy-mode-vi Escape send -X cancel

# --- Quick reload ---
bind r source-file ~/.tmux.conf \; display "Config reloaded"

# --- Session management ---
bind S command-prompt -p "New session:" "new-session -s '%%'"
bind s choose-tree -sZ           # Session picker

# --- Pane borders ---
set -g pane-border-style "fg=#313244"
set -g pane-active-border-style "fg=#89b4fa"

# --- Window auto-rename ---
set -g allow-rename on

# --- Catppuccin theme (manual install, loaded before TPM) ---
set -g @catppuccin_flavor "mocha"
set -g @catppuccin_window_status_style "basic"
run ~/.config/tmux/plugins/catppuccin/tmux/catppuccin.tmux

# Status bar (uses catppuccin module variables)
set -g status-position bottom
set -g status-left "#{E:@catppuccin_status_session} "
set -g status-right ""

# --- Plugins (via TPM) ---
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-sensible'
set -g @plugin 'tmux-plugins/tmux-resurrect'      # Save/restore sessions
set -g @plugin 'tmux-plugins/tmux-continuum'       # Auto-save sessions
set -g @plugin 'tmux-plugins/tmux-yank'            # System clipboard in copy mode

# tmux-resurrect settings
set -g @resurrect-capture-pane-contents 'on'
set -g @resurrect-strategy-nvim 'session'

# tmux-continuum: auto-save every 15 min
set -g @continuum-restore 'on'
set -g @continuum-save-interval '15'

# Initialize TPM (keep at bottom)
run '~/.tmux/plugins/tpm/tpm'
